<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D PvE Tactical Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #ammo-display { position: absolute; bottom: 20px; right: 20px; color: white; font-size: 24px; text-align: right; }
        #reload-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: gold; font-size: 20px; display: none; }
        #wave-notify { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 48px; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>WAVE: <span id="wave">1</span></div>
        <div>HEALTH: <span id="health">100</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="reload-msg">RELOADING...</div>
    <div id="wave-notify">WAVE START</div>
    <div id="ammo-display">
        <div id="weapon-name">XM7</div>
        <div><span id="current-ammo">45</span> / <span id="max-ammo">45</span></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ゲーム設定 ---
        const WEAPONS = {
            S12K: { name: 'S12K', maxAmmo: 4, rpm: 120, reloadTime: 2000, recoil: 0.15, damage: 25, spread: 0.1, pellets: 8 },
            XM7: { name: 'XM7', maxAmmo: 45, rpm: 750, reloadTime: 2500, recoil: 0.03, damage: 35, spread: 0.01, pellets: 1 }
        };

        let currentWeapon = WEAPONS.XM7;
        let ammo = currentWeapon.maxAmmo;
        let isReloading = false;
        let isAds = false;
        let score = 0;
        let wave = 1;
        let playerHealth = 100;
        let lastFireTime = 0;

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202025);
        scene.fog = new THREE.Fog(0x202025, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 照明
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(light);

        // 地面
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // プレイヤーの腕（簡易的な武器モデル）
        const weaponGroup = new THREE.Group();
        const weaponMesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.1, 0.5),
            new THREE.MeshPhongMaterial({ color: 0x111111 })
        );
        weaponMesh.position.set(0.3, -0.2, -0.5);
        weaponGroup.add(weaponMesh);
        scene.add(weaponGroup);

        // --- 敵管理 ---
        const enemies = [];
        const enemyGeo = new THREE.BoxGeometry(1, 2, 1);
        const enemyMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });

        function spawnWave() {
            const count = 3 + wave * 2;
            for (let i = 0; i < count; i++) {
                const enemy = new THREE.Mesh(enemyGeo, enemyMat);
                const angle = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 10;
                enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
                enemy.userData = { health: 100, lastAttack: 0 };
                scene.add(enemy);
                enemies.push(enemy);
            }
            showWaveNotify();
        }

        function showWaveNotify() {
            const el = document.getElementById('wave-notify');
            el.innerText = `WAVE ${wave}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2000);
        }

        // --- アクション ---
        function fire() {
            if (isReloading || ammo <= 0) return;
            const now = Date.now();
            if (now - lastFireTime < (60000 / currentWeapon.rpm)) return;

            ammo--;
            lastFireTime = now;
            updateUI();

            // 反動（カメラを上に向ける）
            camera.rotation.x += currentWeapon.recoil;
            weaponGroup.position.z += 0.05; // 銃の跳ね返り

            // ヒット判定
            const raycaster = new THREE.Raycaster();
            const center = new THREE.Vector2(0, 0);
            
            for (let i = 0; i < currentWeapon.pellets; i++) {
                raycaster.setFromCamera(center, camera);
                // 拡散
                raycaster.ray.direction.x += (Math.random() - 0.5) * currentWeapon.spread;
                raycaster.ray.direction.y += (Math.random() - 0.5) * currentWeapon.spread;

                const intersects = raycaster.intersectObjects(enemies);
                if (intersects.length > 0) {
                    const target = intersects[0].object;
                    target.userData.health -= currentWeapon.damage;
                    if (target.userData.health <= 0) {
                        scene.remove(target);
                        enemies.splice(enemies.indexOf(target), 1);
                        score += 100;
                        updateUI();
                    }
                }
            }

            if (ammo === 0) reload();
        }

        function reload() {
            if (isReloading || ammo === currentWeapon.maxAmmo) return;
            isReloading = true;
            document.getElementById('reload-msg').style.display = 'block';
            
            // リロード演出（銃を下げる）
            weaponGroup.position.y = -0.5;

            setTimeout(() => {
                ammo = currentWeapon.maxAmmo;
                isReloading = false;
                document.getElementById('reload-msg').style.display = 'none';
                weaponGroup.position.y = 0;
                updateUI();
            }, currentWeapon.reloadTime);
        }

        function updateUI() {
            document.getElementById('current-ammo').innerText = ammo;
            document.getElementById('max-ammo').innerText = currentWeapon.maxAmmo;
            document.getElementById('weapon-name').innerText = currentWeapon.name;
            document.getElementById('score').innerText = score;
            document.getElementById('wave').innerText = wave;
            document.getElementById('health').innerText = Math.max(0, playerHealth);
        }

        // --- 入力制御 ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyR') reload();
            if (e.code === 'Digit1') switchWeapon(WEAPONS.S12K);
            if (e.code === 'Digit2') switchWeapon(WEAPONS.XM7);
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement) {
                if (e.button === 0) fire();
                if (e.button === 2) setAds(true);
            } else {
                document.body.requestPointerLock();
            }
        });
        window.addEventListener('mouseup', (e) => {
            if (e.button === 2) setAds(false);
        });

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                const sensitivity = isAds ? 0.001 : 0.002;
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        function setAds(active) {
            isAds = active;
            camera.fov = active ? 40 : 75;
            camera.updateProjectionMatrix();
            weaponGroup.position.x = active ? -0.3 : 0; // 武器を中央に寄せる
        }

        function switchWeapon(wpn) {
            if (isReloading) return;
            currentWeapon = wpn;
            ammo = wpn.maxAmmo;
            updateUI();
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 武器の揺れ・位置復元
            weaponGroup.position.lerp(new THREE.Vector3(0, 0, 0), 0.1);
            weaponGroup.quaternion.copy(camera.quaternion);
            weaponGroup.position.add(camera.position);

            // 移動 (簡易)
            const speed = 0.1;
            if (keys['KeyW']) camera.translateZ(-speed);
            if (keys['KeyS']) camera.translateZ(speed);
            if (keys['KeyA']) camera.translateX(-speed);
            if (keys['KeyD']) camera.translateX(speed);
            camera.position.y = 1.6;

            // 敵のAI
            const now = Date.now();
            enemies.forEach(enemy => {
                const dir = new THREE.Vector3().subVectors(camera.position, enemy.position);
                dir.y = 0;
                const dist = dir.length();
                
                if (dist > 1.5) {
                    enemy.translateOnAxis(dir.normalize(), 0.03);
                } else {
                    // 攻撃
                    if (now - enemy.userData.lastAttack > 1500) {
                        playerHealth -= 10;
                        enemy.userData.lastAttack = now;
                        updateUI();
                    }
                }
                enemy.lookAt(camera.position.x, 1, camera.position.z);
            });

            // ウェーブクリア判定
            if (enemies.length === 0) {
                wave++;
                spawnWave();
            }

            renderer.render(scene, camera);
        }

        // 初期化
        camera.rotation.order = 'YXZ';
        spawnWave();
        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
