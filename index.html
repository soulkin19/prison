<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>OUTBREAK - 宇宙基地最終脱出プロトコル</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: #0a0e17;
    color: #e0f7ff;
    font-family: "Courier New", Consolas, monospace;
    overflow: hidden;
    image-rendering: pixelated;
  }

  #game-container {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #scene {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, #0b1e3f 0%, #000814 100%);
    transition: background 1.5s;
  }

  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at 50% 30%, rgba(255,180,100,0.08) 0%, transparent 60%);
    animation: alarm 8s infinite alternate;
  }

  @keyframes alarm {
    0% { opacity: 0.1; }
    100% { opacity: 0.4; }
  }

  #ui {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 48px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    border-bottom: 1px solid #00d4ff44;
    display: flex;
    align-items: center;
    padding: 0 16px;
    font-size: 1.1rem;
    z-index: 100;
  }

  #inventory {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    background: rgba(0,0,0,0.65);
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid #1e90ff44;
    box-shadow: 0 0 20px #0ff3;
    z-index: 90;
    pointer-events: auto;
  }

  .slot {
    width: 64px;
    height: 64px;
    background: #0a1f3f;
    border: 2px solid #4488ff;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .slot:hover {
    border-color: #00ffff;
    box-shadow: 0 0 15px #00ffff88;
    transform: scale(1.08);
  }

  .slot.used {
    opacity: 0.5;
    border-color: #444;
  }

  #message {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 760px;
    padding: 16px 32px;
    background: rgba(0,20,40,0.92);
    border: 1px solid #00aaff88;
    border-radius: 12px;
    font-size: 1.3rem;
    line-height: 1.6;
    text-align: center;
    opacity: 0;
    transition: opacity 0.6s;
    pointer-events: none;
    z-index: 80;
  }

  #choices {
    position: absolute;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 420px;
    pointer-events: auto;
    z-index: 70;
  }

  .btn {
    padding: 14px 32px;
    font-size: 1.2rem;
    background: linear-gradient(145deg, #0a4488, #002b5c);
    border: 2px solid #1e90ff;
    border-radius: 10px;
    color: #e0f7ff;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn:hover {
    background: linear-gradient(145deg, #1e90ff, #00d4ff);
    color: #000814;
    box-shadow: 0 0 25px #00d4ffaa;
    transform: translateY(-2px);
  }

  #room-title {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 2.2rem;
    text-shadow: 0 0 20px #00aaff;
    letter-spacing: 2px;
    z-index: 60;
    pointer-events: none;
  }

  .object {
    position: absolute;
    cursor: pointer;
    transition: transform 0.2s;
    filter: drop-shadow(0 0 8px #00ffff66);
  }

  .object:hover {
    transform: scale(1.12);
  }

  .pixel-art {
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="scene"></div>
  <div id="overlay"></div>
  
  <div id="ui">
    <div id="top-bar">
      <div style="flex:1">EMERGENCY ESCAPE PROTOCOL - 残存酸素： <span id="oxygen">68</span>%</div>
      <div>時刻： T- <span id="timer">19:42</span></div>
    </div>

    <div id="room-title">DOCKING BAY - αセクター</div>

    <div id="message"></div>

    <div id="choices"></div>

    <div id="inventory"></div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
//  ゲームデータ
// ────────────────────────────────────────────────
const gameState = {
  oxygen: 68,
  timeLeft: 19*60 + 42,   // 19分42秒
  location: "dock",
  flags: {
    powerRestored: false,
    computerHacked: false,
    foundDataChip: false,
    openedLocker: false,
    hasBlueKeycard: false,
    hasRedKeycard: false,
    hasPlasmaCutter: false,
    hasCodeFromLab: false,
    sawCorpse: false,
    knowsAboutAI: false,
    reactorCritical: false
  },
  inventory: []
};

const locations = {
  dock: {
    title: "DOCKING BAY - αセクター",
    bg: "linear-gradient(to bottom, #0b1e3f, #000814)",
    objects: [
      { name: "壊れたシャトル", x: 15, y: 45, emoji: "🛰️💥", action: () => showMsg("外部接続が完全に破壊されている…") },
      { name: "非常用ロッカー", x: 38, y: 55, emoji: "🔒", action: lockerAction },
      { name: "制御パネル", x: 68, y: 38, emoji: "🖥️", action: controlPanelAction },
      { name: "通路 → 研究室", x: 88, y: 50, emoji: "🚪", action: () => moveTo("lab") }
    ]
  },
  lab: {
    title: "RESEARCH LAB - 生物・AI研究区画",
    bg: "linear-gradient(to bottom, #2a0a3f, #110014)",
    objects: [
      { name: "死体", x: 20, y: 60, emoji: "💀", action: corpseAction },
      { name: "研究端末", x: 45, y: 35, emoji: "💻", action: terminalAction },
      { name: "冷凍保管庫", x: 75, y: 50, emoji: "🧊", action: freezerAction },
      { name: "通路 → 発電所", x: 5, y: 50, emoji: "🚪", action: () => moveTo("power") },
      { name: "通路 → ドック", x: 88, y: 50, emoji: "🚪", action: () => moveTo("dock") }
    ]
  },
  power: {
    title: "REACTOR CONTROL - メイン発電所",
    bg: "linear-gradient(to bottom, #3f1a0a, #140a00)",
    objects: [
      { name: "非常用プラズマカッター", x: 25, y: 55, emoji: "🔧⚡", action: () => getItem("plasmaCutter", "🔧⚡", "プラズマカッター") },
      { name: "メインコンソール", x: 60, y: 40, emoji: "🖥️🔴", action: reactorConsoleAction },
      { name: "通路 → 研究室", x: 88, y: 50, emoji: "🚪", action: () => moveTo("lab") }
    ]
  },
  escape: {
    title: "ESCAPE POD BAY - 最終脱出ポッド",
    bg: "linear-gradient(to bottom, #004d40, #001a14)",
    objects: [
      { name: "脱出ポッド", x: 50, y: 35, emoji: "🚀", action: launchEscapePod }
    ]
  }
};

// ────────────────────────────────────────────────
//  基本関数
// ────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showMsg(text, duration = 5000) {
  const el = $("message");
  el.textContent = text;
  el.style.opacity = 1;
  if (duration > 0) {
    setTimeout(() => el.style.opacity = 0, duration);
  }
}

function moveTo(loc) {
  if (gameState.location === loc) return;
  gameState.location = loc;

  const room = locations[loc];
  $("room-title").textContent = room.title;
  $("scene").style.background = room.bg;

  updateSceneObjects();
  updateChoices([]);
  showMsg(`→ ${room.title} に移動しました`, 3000);
}

function updateSceneObjects() {
  const container = $("scene");
  container.innerHTML = "";

  const room = locations[gameState.location];
  room.objects.forEach(obj => {
    if (shouldShowObject(obj)) {
      const div = document.createElement("div");
      div.className = "object pixel-art";
      div.style.left = obj.x + "%";
      div.style.top = obj.y + "%";
      div.innerHTML = `<span style="font-size:3.8rem">${obj.emoji}</span>`;
      div.onclick = () => obj.action();
      container.appendChild(div);
    }
  });
}

function shouldShowObject(obj) {
  // 条件付き表示の例
  if (gameState.location === "dock" && obj.name === "非常用ロッカー" && gameState.flags.openedLocker) {
    return false;
  }
  return true;
}

function getItem(id, emoji, name) {
  if (gameState.inventory.includes(id)) return;
  gameState.inventory.push(id);

  const slot = document.createElement("div");
  slot.className = "slot";
  slot.innerHTML = emoji;
  slot.title = name;
  slot.onclick = () => useItem(id);
  $("inventory").appendChild(slot);

  showMsg(`【入手】 ${name}`);
}

// 使用するアイテム（クリックで使う）
function useItem(id) {
  if (gameState.location === "lab" && id === "plasmaCutter" && !gameState.flags.hasCodeFromLab) {
    showMsg("冷凍保管庫の強化ガラスを切断…中からデータチップを回収した！");
    gameState.flags.hasCodeFromLab = true;
    getItem("dataChip", "💾", "暗号化データチップ");
  }
  else if (gameState.location === "dock" && id === "blueKeycard") {
    showMsg("青いキーカードで制御パネルのレベル1ロックを解除した");
    gameState.flags.hasBlueKeycard = true; // フラグ更新
  }
  // 他のアイテム使用ケース…
}

// ────────────────────────────────────────────────
//  各オブジェクトのアクション
// ────────────────────────────────────────────────
function lockerAction() {
  if (gameState.flags.openedLocker) return;

  if (gameState.flags.hasBlueKeycard) {
    showMsg("青いキーカードでロッカーを開けた！");
    gameState.flags.openedLocker = true;
    getItem("blueKeycard", "💳青", "青色アクセスカード");
    getItem("redKeycard", "💳赤", "赤色アクセスカード（高度な権限）");
  } else {
    showMsg("ロックされている…レベル2認証が必要だ");
  }
}

function controlPanelAction() {
  if (!gameState.flags.powerRestored) {
    showMsg("電力が復旧していない…コンソールが完全にダウンしている");
    return;
  }

  if (!gameState.flags.hasRedKeycard) {
    showMsg("高度な権限（赤カード）が必要だ");
    return;
  }

  showMsg("メインコンソールにアクセス…脱出ポッド起動シーケンスを入力可能になりました");
  updateChoices([
    "脱出ポッド起動シーケンスを開始する →",
    "（キャンセル）"
  ], [
    () => moveTo("escape"),
    () => showMsg("まだ準備が…")
  ]);
}

function corpseAction() {
  if (gameState.flags.sawCorpse) return;
  gameState.flags.sawCorpse = true;

  showMsg("…同僚の遺体だ。胸に深い爪痕。感染か…？\n近くにメモが落ちている…\n『AIコアが暴走。パスコードは生体認証+1973』");
  gameState.flags.knowsAboutAI = true;
}

function terminalAction() {
  if (gameState.flags.computerHacked) {
    showMsg("すでにハッキング済み…これ以上の情報はない");
    return;
  }

  showMsg("パスワードを要求されている…");
  updateChoices([
    "1973 を入力する（メモから）",
    "適当に入力する",
    "諦める"
  ], [
    () => {
      showMsg("…認証成功！システムにバックドアを仕込んだ。電力復旧可能に。");
      gameState.flags.computerHacked = true;
      gameState.flags.powerRestored = true;
      showMsg("※メイン発電所の非常電源がオンラインになりました", 8000);
    },
    () => showMsg("…アクセス拒否。警報が鳴り始めた！酸素が-5%"),
    () => showMsg("やめておこう…")
  ]);
}

function freezerAction() {
  if (!gameState.flags.hasPlasmaCutter) {
    showMsg("強化ガラスで封鎖されている…普通の工具では無理だ");
    return;
  }
  // プラズマカッター使用は inventory クリックで処理
  showMsg("冷凍保管庫の中を覗く…何かありそうだ");
}

function reactorConsoleAction() {
  if (!gameState.flags.powerRestored) {
    showMsg("コンソール自体がダウンしている…");
    return;
  }

  if (gameState.flags.reactorCritical) {
    showMsg("すでに暴走カウントダウンが始まっている…急がないと！");
    return;
  }

  showMsg("リアクター制御画面\n臨界事故回避コードを入力？");
  updateChoices([
    "回避コードを入力する（研究室のデータチップが必要）",
    "意図的に暴走させる（？）",
    "何もしない"
  ], [
    () => {
      if (gameState.flags.hasCodeFromLab) {
        showMsg("臨界回避コード入力成功！リアクター安定化…これで脱出ポッドに電力供給可能！");
        gameState.flags.reactorCritical = false;
      } else {
        showMsg("適切なコードがない…失敗。リアクターが臨界状態に突入した！");
        gameState.flags.reactorCritical = true;
        gameState.oxygen -= 15;
      }
    },
    () => {
      showMsg("…故意に制御を外した。リアクターが暴走開始。残り時間大幅短縮！");
      gameState.flags.reactorCritical = true;
      gameState.timeLeft = Math.min(gameState.timeLeft, 5*60);
    },
    () => showMsg("まだ早い…")
  ]);
}

function launchEscapePod() {
  let ending = "bad";

  if (gameState.flags.powerRestored && !gameState.flags.reactorCritical) {
    if (gameState.oxygen > 25) {
      ending = "true";
    } else {
      ending = "oxygen";
    }
  }

  document.body.innerHTML = `
    <div style="position:absolute;inset:0;background:#000;color:#0f0;display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:2.4rem;">
      <div style="margin-bottom:60px;">ESCAPE SEQUENCE INITIATED</div>
      ${ending === "true" ? `
        <div style="color:#0f8;font-size:3.2rem;margin:40px 0;">生存脱出成功 - あなたは生き延びた</div>
        <div style="font-size:1.4rem;opacity:0.7;">（真エンド）</div>
      ` : ending === "oxygen" ? `
        <div style="color:#f80;font-size:2.8rem;margin:40px 0;">酸素切れ寸前での緊急脱出…生還は極めて困難</div>
        <div style="font-size:1.4rem;opacity:0.7;">（酸欠エンド）</div>
      ` : `
        <div style="color:#f44;font-size:2.8rem;margin:40px 0;">脱出ポッド起動失敗…基地と共に消滅</div>
        <div style="font-size:1.4rem;opacity:0.7;">（バッドエンド）</div>
      `}
      <div style="margin-top:120px;font-size:1.3rem;opacity:0.6;">リロードで最初からやり直せます</div>
    </div>
  `;
}

// ────────────────────────────────────────────────
//  時間・酸素減少システム
// ────────────────────────────────────────────────
setInterval(() => {
  gameState.timeLeft--;
  gameState.oxygen -= (gameState.flags.reactorCritical ? 0.35 : 0.08);

  if (gameState.oxygen <= 0) {
    gameState.oxygen = 0;
    showMsg("酸素が尽きた……意識が……", 999999);
    setTimeout(() => {
      document.body.innerHTML = `<div style="position:absolute;inset:0;background:#000;color:#400;display:flex;align-items:center;justify-content:center;font-size:4rem;">GAME OVER - ASPHYXIA</div>`;
    }, 4000);
  }

  const min = Math.floor(gameState.timeLeft / 60);
  const sec = String(gameState.timeLeft % 60).padStart(2,"0");
  $("timer").textContent = `${min}:${sec}`;
  $("oxygen").textContent = Math.max(0, Math.floor(gameState.oxygen));

  if (gameState.timeLeft <= 0) {
    document.body.innerHTML = `<div style="position:absolute;inset:0;background:#000;color:#f44;display:flex;align-items:center;justify-content:center;font-size:4rem;">GAME OVER - TIME OUT</div>`;
  }
}, 1000);

// 初回表示
moveTo("dock");
showMsg("■ 宇宙基地「オルフェウス」最深部\n■ 感染拡大により全システム崩壊中\n■ 残存酸素 68% ／ 脱出ポッドまでの推定所要時間 約20分\n\n…生きて帰れるか？", 12000);

</script>
</body>
</html>
