<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Tactical PvE - Stage & UZI Update</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; background: #000; }
        #ui { position: absolute; top: 15px; left: 15px; color: #111; pointer-events: none; background: rgba(255,255,255,0.8); padding: 12px; border-radius: 8px; font-weight: bold; border: 2px solid #444; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; }
        #crosshair::before { width: 100%; height: 2px; top: 9px; } #crosshair::after { width: 2px; height: 100%; left: 9px; }
        
        /* スナイパースコープ演出 */
        #scope-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, black 35%, black 100%);
            display: none; pointer-events: none; z-index: 10;
        }
        #scope-overlay::before, #scope-overlay::after {
            content: ''; position: absolute; background: rgba(0, 255, 0, 0.5);
        }
        #scope-overlay::before { width: 100%; height: 1px; top: 50%; }
        #scope-overlay::after { width: 1px; height: 100%; left: 50%; }

        #ammo-display { position: absolute; bottom: 30px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #777; min-width: 140px; z-index: 5; }
        #reload-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #ffeb3b; font-size: 24px; font-weight: bold; display: none; text-shadow: 2px 2px #000; z-index: 5; }
        #click-to-start { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; z-index: 100; text-align: center; }
    </style>
</head>
<body>
    <div id="click-to-start">CLICK TO DEPLOY<br><span style="font-size:14px;">[WASD]: Move | [Space]: Fire | [Enter]: ADS | [1-4]: Switch Weapon</span></div>
    <div id="scope-overlay"></div>
    <div id="ui">SCORE: <span id="score">0</span> | WAVE: <span id="wave">1</span> | HP: <span id="health">100</span></div>
    <div id="reload-msg">RELOADING...</div>
    <div id="crosshair"></div>

    <div id="ammo-display">
        <div id="weapon-name" style="color: #ffeb3b; font-size: 1.2em;">XM7</div>
        <div style="font-size: 32px;"><span id="current-ammo">45</span> / <span id="max-ammo">45</span></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ステージ設定 ---
        const STAGE_SIZE = 100;

        const WEAPONS = {
            S12K: { name: 'S12K', maxAmmo: 4, rpm: 200, reloadTime: 1800, recoil: 0.14, damage: 30, spread: 0.14, pellets: 10, color: 0x1a1a1a, adsFov: 50 },
            XM7: { name: 'XM7', maxAmmo: 45, rpm: 800, reloadTime: 2200, recoil: 0.04, damage: 35, spread: 0.02, pellets: 1, color: 0x7a6a4f, adsFov: 40 },
            AWM: { name: 'AWM', maxAmmo: 5, rpm: 45, reloadTime: 3500, recoil: 0.6, damage: 200, spread: 0.001, pellets: 1, color: 0x4a5d4a, adsFov: 15 },
            UZI: { name: 'UZI', maxAmmo: 32, rpm: 1200, reloadTime: 1500, recoil: 0.03, damage: 15, spread: 0.08, pellets: 1, color: 0x333333, adsFov: 60 }
        };

        let currentWeapon = WEAPONS.XM7;
        let ammo = currentWeapon.maxAmmo, isReloading = false, isAds = false;
        let score = 0, wave = 1, playerHealth = 100, lastFireTime = 0, targetRecoilX = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(30, 60, 30);
        scene.add(sun);

        // 地面
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(STAGE_SIZE, STAGE_SIZE), new THREE.MeshStandardMaterial({ color: 0x6a8a6a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 外壁の設置
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const createWall = (w, h, d, x, z) => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            wall.position.set(x, h/2, z);
            scene.add(wall);
        };
        createWall(STAGE_SIZE, 8, 2, 0, STAGE_SIZE/2);  // North
        createWall(STAGE_SIZE, 8, 2, 0, -STAGE_SIZE/2); // South
        createWall(2, 8, STAGE_SIZE, STAGE_SIZE/2, 0);  // East
        createWall(2, 8, STAGE_SIZE, -STAGE_SIZE/2, 0); // West

        // --- 武器モデル ---
        const weaponGroup = new THREE.Group();
        const weaponPivot = new THREE.Group();
        const gunContainer = new THREE.Group();

        function buildGunModel(config) {
            gunContainer.clear();
            const mat = new THREE.MeshStandardMaterial({ color: config.color, metalness: 0.6, roughness: 0.4 });
            
            // 本体サイズ切り替え
            let bW = 0.1, bH = 0.15, bL = 0.6;
            if(config.name === 'UZI') { bW = 0.08; bH = 0.12; bL = 0.35; }

            const body = new THREE.Mesh(new THREE.BoxGeometry(bW, bH, bL), mat);
            gunContainer.add(body);

            const barrelLen = config.name === 'AWM' ? 0.8 : (config.name === 'UZI' ? 0.15 : 0.4);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, barrelLen), mat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.z = - (bL/2 + barrelLen/2);
            gunContainer.add(barrel);

            const mag = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.2, 0.12), mat);
            mag.position.set(0, -0.15, -0.05);
            gunContainer.add(mag);

            if (config.name === 'AWM') {
                const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3), mat);
                scope.rotation.x = Math.PI / 2; scope.position.y = 0.12;
                gunContainer.add(scope);
            }

            gunContainer.position.set(0.3, -0.25, -0.6);
            return gunContainer;
        }

        weaponPivot.add(buildGunModel(currentWeapon));
        weaponGroup.add(weaponPivot);
        scene.add(weaponGroup);

        // --- 敵と弾道 ---
        const tracers = [], enemies = [];
        function spawnEnemy() {
            const e = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xcc3333 }));
            // 壁の内側に湧くように調整
            const margin = 5;
            let ex = (Math.random() - 0.5) * (STAGE_SIZE - margin * 2);
            let ez = (Math.random() - 0.5) * (STAGE_SIZE - margin * 2);
            
            // プレイヤーに近すぎないように
            if(Math.abs(ex - camera.position.x) < 10) ex += 15;
            
            e.position.set(ex, 1, ez);
            e.userData = { hp: 100, lastAtk: 0 };
            scene.add(e);
            enemies.push(e);
        }

        function fire() {
            if (isReloading || ammo <= 0 || playerHealth <= 0) return;
            const now = Date.now();
            if (now - lastFireTime < (60000 / currentWeapon.rpm)) return;

            ammo--; lastFireTime = now; updateUI();
            targetRecoilX += currentWeapon.recoil;
            weaponPivot.position.z += 0.2; weaponPivot.rotation.x -= 0.15;

            const ray = new THREE.Raycaster();
            for (let i = 0; i < currentWeapon.pellets; i++) {
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                ray.ray.direction.x += (Math.random()-0.5) * currentWeapon.spread;
                ray.ray.direction.y += (Math.random()-0.5) * currentWeapon.spread;

                const muz = new THREE.Vector3().setFromMatrixPosition(gunContainer.matrixWorld);
                const tar = ray.ray.origin.clone().add(ray.ray.direction.clone().multiplyScalar(100));
                
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 2.5), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
                mesh.position.copy(muz); mesh.lookAt(tar); scene.add(mesh);
                tracers.push({ mesh, life: 8 });

                const hits = ray.intersectObjects(enemies);
                if(hits.length > 0) {
                    const e = hits[0].object;
                    e.userData.hp -= currentWeapon.damage;
                    if(e.userData.hp <= 0) { scene.remove(e); enemies.splice(enemies.indexOf(e), 1); score += 100; }
                }
            }
            if(ammo === 0) reload();
        }

        function reload() {
            if(isReloading || ammo === currentWeapon.maxAmmo) return;
            isReloading = true;
            document.getElementById('reload-msg').style.display = 'block';
            setTimeout(() => {
                ammo = currentWeapon.maxAmmo; isReloading = false;
                document.getElementById('reload-msg').style.display = 'none';
                updateUI();
            }, currentWeapon.reloadTime);
        }

        function switchWeapon(key) {
            currentWeapon = WEAPONS[key]; buildGunModel(currentWeapon);
            ammo = currentWeapon.maxAmmo; isAds = false;
            updateScope(); updateUI();
        }

        function updateScope() {
            camera.fov = isAds ? currentWeapon.adsFov : 75;
            camera.updateProjectionMatrix();
            const scopeOverlay = document.getElementById('scope-overlay');
            const crosshair = document.getElementById('crosshair');
            
            if (isAds && currentWeapon.name === 'AWM') {
                scopeOverlay.style.display = 'block';
                crosshair.style.display = 'none';
                gunContainer.visible = false; // スコープ内は銃を消す
            } else {
                scopeOverlay.style.display = 'none';
                crosshair.style.display = 'block';
                gunContainer.visible = true;
                gunContainer.position.x = isAds ? 0 : 0.3;
                gunContainer.position.y = isAds ? -0.12 : -0.25;
            }
        }

        function updateUI() {
            document.getElementById('current-ammo').innerText = ammo;
            document.getElementById('max-ammo').innerText = currentWeapon.maxAmmo;
            document.getElementById('weapon-name').innerText = currentWeapon.name;
            document.getElementById('score').innerText = score;
            document.getElementById('wave').innerText = wave;
            document.getElementById('health').innerText = Math.max(0, playerHealth);
        }

        // --- 操作 ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Space') { e.preventDefault(); fire(); }
            if(e.code === 'Enter') { e.preventDefault(); isAds = !isAds; updateScope(); }
            if(e.code === 'KeyR') reload();
            if(e.code === 'Digit1') switchWeapon('S12K');
            if(e.code === 'Digit2') switchWeapon('XM7');
            if(e.code === 'Digit3') switchWeapon('AWM');
            if(e.code === 'Digit4') switchWeapon('UZI');
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                const sens = isAds ? (currentWeapon.adsFov / 75) * 0.002 : 0.0022;
                camera.rotation.y -= e.movementX * sens;
                camera.rotation.x -= e.movementY * sens;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
            }
        });

        document.getElementById('click-to-start').addEventListener('click', function() {
            this.style.display = 'none';
            document.body.requestPointerLock();
        });

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            if (now - lastFireTime > 120) targetRecoilX *= 0.8;
            camera.rotation.x += targetRecoilX * 0.1;
            targetRecoilX *= 0.92;

            weaponPivot.position.lerp(new THREE.Vector3(0,0,0), 0.2);
            weaponPivot.rotation.x *= 0.85;
            weaponGroup.position.copy(camera.position);
            weaponGroup.quaternion.copy(camera.quaternion);

            for(let i=tracers.length-1; i>=0; i--) {
                tracers[i].mesh.translateZ(4.5); tracers[i].life--;
                if(tracers[i].life <= 0) { scene.remove(tracers[i].mesh); tracers.splice(i,1); }
            }

            const s = 0.15;
            const nextPos = camera.position.clone();
            if(keys['KeyW']) nextPos.add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(s));
            if(keys['KeyS']) nextPos.add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(-s));
            // 壁の判定（簡易）
            const limit = STAGE_SIZE / 2 - 2;
            if(Math.abs(nextPos.x) < limit && Math.abs(nextPos.z) < limit) {
                camera.position.x = nextPos.x;
                camera.position.z = nextPos.z;
            }
            camera.position.y = 1.6;

            enemies.forEach(e => {
                const v = new THREE.Vector3().subVectors(camera.position, e.position);
                v.y = 0;
                if(v.length() > 1.8) e.translateOnAxis(v.normalize(), 0.06 + wave*0.005);
                else if(playerHealth > 0 && now - e.userData.lastAtk > 1000) {
                    playerHealth -= 10; e.userData.lastAtk = now; updateUI();
                    if(playerHealth <= 0) { alert("DEAD. SCORE: " + score); location.reload(); }
                }
                e.lookAt(camera.position.x, 1, camera.position.z);
            });

            if(enemies.length === 0) { wave++; for(let i=0; i<3+wave; i++) spawnEnemy(); }
            renderer.render(scene, camera);
        }

        spawnEnemy(); updateUI(); animate();
    </script>
</body>
</html>
