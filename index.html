<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta Force: Tide Prison 3D - iPad Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; text-shadow: 0 0 5px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        /* ジョイスティック（iPad用） */
        .joystick { position: absolute; bottom: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); }
        #move-joy { left: 50px; }
        #look-joy { right: 50px; }
        .knob { position: absolute; width: 50px; height: 50px; background: rgba(0,255,0,0.3); border-radius: 50%; top: 35px; left: 35px; }
    </style>
</head>
<body>

<div id="ui">
    <h2>TIDE PRISON: ESCAPE</h2>
    <div id="pos">POS: 0, 0</div>
    <div id="msg">出口の光を探せ...</div>
</div>
<div id="crosshair"></div>

<div id="move-joy" class="joystick"><div id="move-knob" class="knob"></div></div>
<div id="look-joy" class="joystick"><div id="look-knob" class="knob"></div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer;
    let moveData = { x: 0, y: 0 }, lookData = { x: 0, y: 0 };
    let playerY = 0, lon = 0, lat = 0;
    const worldSize = 4000;

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.FogExp2(0x020202, 0.0015);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 1.7, 0); // 人間の目線高さ

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ライト
        const ambient = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambient);

        // 地面
        const floorGeo = new THREE.PlaneGeometry(worldSize, worldSize);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0x050505 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 監獄の壁と構造物の生成（プロシージャル再現）
        const wallGeo = new THREE.BoxGeometry(10, 20, 10);
        const wallMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        
        for (let i = 0; i < 500; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.x = Math.random() * worldSize - worldSize/2;
            wall.position.z = Math.random() * worldSize - worldSize/2;
            wall.scale.set(Math.random() * 5 + 1, Math.random() * 2 + 1, Math.random() * 5 + 1);
            scene.add(wall);

            // 警報灯
            if (Math.random() > 0.8) {
                const light = new THREE.PointLight(0xff0000, 50, 50);
                light.position.set(wall.position.x, 15, wall.position.z);
                scene.add(light);
            }
        }

        // 脱出口（巨大な青い光柱）
        const exitGeo = new THREE.CylinderGeometry(20, 20, 1000, 32);
        const exitMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
        const exit = new THREE.Mesh(exitGeo, exitMat);
        exit.position.set(1500, 500, 1500);
        scene.add(exit);

        setupJoysticks();
        animate();
    }

    function setupJoysticks() {
        const setup = (id, knobId, data) => {
            const container = document.getElementById(id);
            const knob = document.getElementById(knobId);
            const move = (e) => {
                const touch = e.touches[0];
                const rect = container.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let dx = touch.clientX - centerX;
                let dy = touch.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);
                
                data.x = Math.cos(angle) * (dist / 50);
                data.y = Math.sin(angle) * (dist / 50);
                knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            };
            container.addEventListener('touchstart', move);
            container.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
            container.addEventListener('touchend', () => {
                data.x = 0; data.y = 0;
                knob.style.transform = 'translate(0,0)';
            });
        };
        setup('move-joy', 'move-knob', moveData);
        setup('look-joy', 'look-knob', lookData);
    }

    function animate() {
        requestAnimationFrame(animate);

        // 視点移動
        lon += lookData.x * 2.5;
        lat = Math.max(-85, Math.min(85, lat - lookData.y * 2));
        
        const phi = THREE.MathUtils.degToRad(90 - lat);
        const theta = THREE.MathUtils.degToRad(lon);
        
        const target = new THREE.Vector3();
        target.setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        // 移動
        if (moveData.x !== 0 || moveData.y !== 0) {
            const forward = new THREE.Vector3().setFromSphericalCoords(1, Math.PI/2, theta);
            const right = new THREE.Vector3().setFromSphericalCoords(1, Math.PI/2, theta - Math.PI/2);
            
            camera.position.addScaledVector(forward, -moveData.y * 0.8);
            camera.position.addScaledVector(right, moveData.x * 0.8);
        }

        // UI更新
        document.getElementById('pos').innerText = `POS: ${Math.round(camera.position.x)}, ${Math.round(camera.position.z)}`;
        
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
