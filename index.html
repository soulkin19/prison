<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ヒカマーズ図鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;display=swap');

        :root {
            font-family: 'Noto Sans JP', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #f1f5f9;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .modal {
            animation: modalPop 0.3s ease forwards;
        }

        @keyframes modalPop {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .profile-icon {
            box-shadow: 0 0 0 8px rgba(148, 163, 184, 0.2);
        }

        .hobby-tag {
            transition: all 0.2s ease;
        }
        .hobby-tag:hover {
            transform: scale(1.05);
            background-color: #a78bfa !important;
            color: #0f172a !important;
        }
    </style>
</head>
<body class="min-h-screen pb-12">
    <!-- ヘッダー -->
    <header class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <!-- ロゴ -->
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-violet-600 rounded-2xl flex items-center justify-center text-2xl font-bold">📖</div>
                <h1 class="text-3xl font-bold tracking-tighter">ヒカマーズ図鑑</h1>
            </div>

            <!-- 検索バー -->
            <div class="flex-1 max-w-xl mx-8">
                <div class="relative">
                    <input 
                        id="searchInput"
                        type="text" 
                        placeholder="ヒカマー名・@ハンドル・趣味で検索..."
                        class="w-full bg-slate-800 text-white placeholder:text-slate-400 border border-slate-700 focus:border-violet-500 rounded-3xl py-4 px-6 pl-14 text-lg outline-none transition-all"
                    >
                    <div class="absolute left-6 top-1/2 -translate-y-1/2 text-slate-400">
                        🔎
                    </div>
                </div>
            </div>

            <!-- 右側情報 -->
            <div class="flex items-center gap-4">
                <div class="text-sm text-slate-400 flex items-center gap-2">
                    <span id="totalCount" class="font-mono text-2xl font-bold text-violet-400">0</span>
                    <span>人のヒカマー</span>
                </div>
                <a href="https://x.com" target="_blank" 
                   class="flex items-center gap-2 bg-white text-slate-900 px-5 py-3 rounded-3xl font-medium hover:bg-slate-100 transition-colors">
                    <span class="text-xl">𝕏</span>
                    <span class="hidden md:inline">Xでヒカマーを探す</span>
                </a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6">
        
        <!-- 一覧ヘッダー -->
        <div class="flex justify-between items-end mt-10 mb-6">
            <div>
                <h2 id="listTitle" class="text-3xl font-bold">ヒカマー一覧</h2>
                <p id="resultText" class="text-slate-400">五十音順で並んでいます（趣味も検索対象）</p>
            </div>
            <button onclick="resetView()" 
                    class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm font-medium">
                <span>🔄</span>
                <span>一覧に戻る</span>
            </button>
        </div>

        <!-- ヒカマー一覧 -->
        <div id="listContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- JavaScriptで動的に生成されます -->
        </div>

        <!-- 空の場合のメッセージ -->
        <div id="emptyMessage" class="hidden text-center py-20">
            <div class="text-6xl mb-6">🤔</div>
            <h3 class="text-2xl font-medium mb-2">該当するヒカマーが見つかりません</h3>
            <p class="text-slate-400">別のキーワード（名前・ハンドル・趣味）で検索してみてください</p>
        </div>
    </div>

    <!-- プロフィールモーダル（#ユーザーid で表示） -->
    <div id="profileModal" onclick="if(event.target.id === 'profileModal') closeModal()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] px-4">
        
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-slate-800 w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl">
            
            <div class="relative">
                <!-- 閉じるボタン -->
                <button onclick="closeModal()" 
                        class="absolute top-6 right-6 text-4xl leading-none text-slate-400 hover:text-white z-10">×</button>

                <div id="modalContent" class="p-8">
                    <!-- JavaScriptで動的に挿入 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========================
        // ヒカマーデータ（趣味フィールドを追加して検索を大幅強化！）
        // ========================
        let hikamers = [
            {
                id: "akari_hkmr",
                displayName: "送キン",
                username: "@soul_kinmani",
                icon: "https://pbs.twimg.com/profile_images/2043678532329766912/gkaNQ1HR_400x400.jpg",
                bio: "このサイトの製作者。shomaru7が好き",
                xLink: "https://x.com/soul_kinmani",
                hobbies: ["プログラミング", "ウェブ開発", "ヒカキン好き", "サイト制作"]
            },
            {
                id: "izumi_hkmr",
                displayName: "HIKAKIN",
                username: "@hikakin",
                icon: "https://pbs.twimg.com/profile_images/2006602716844535810/zaKv0MUS_400x400.jpg",
                bio: "ヒカキン本物。鬼茶とみそきんという独自商品をセブンイレブンにて発売。",
                xLink: "https://x.com/hikakin",
                hobbies: ["YouTube", "商品開発", "ゲーム実況", "お菓子", "鬼茶"]
            },
            {
                id: "umi_hkmr",
                displayName: "十字架_mania",
                username: "@maebahesiru2",
                icon: "https://picsum.photos/id/102/300/300",
                bio: "様々な便利ツールの製作者。TCGなど面白いものがたくさん。",
                xLink: "https://x.com/maebahesioru2",
                hobbies: ["ツール開発", "TCG", "プログラミング", "カードゲーム", "便利ツール"]
            },
            {
                id: "emi_hkmr",
                displayName: "えみ",
                username: "@emi_hkmr",
                icon: "https://picsum.photos/id/1009/300/300",
                bio: "笑顔のヒカマー。みんなの元気チャージ担当☆",
                xLink: "https://x.com/emi_hkmr",
                hobbies: ["コミュニケーション", "元気チャージ", "笑顔", "癒し", "イベント"]
            },
            {
                id: "ota_hkmr",
                displayName: "おおた",
                username: "@ota_hkmr",
                icon: "https://picsum.photos/id/1015/300/300",
                bio: "ヒカマーズのまとめ役。情報収集が趣味です📚",
                xLink: "https://x.com/ota_hkmr",
                hobbies: ["情報収集", "まとめ", "読書", "データ分析", "リサーチ"]
            },
            {
                id: "kaori_hkmr",
                displayName: "かおり",
                username: "@kaori_hkmr",
                icon: "https://picsum.photos/id/133/300/300",
                bio: "香りとヒカマを愛するアーティスト。創作活動中🎨",
                xLink: "https://x.com/kaori_hkmr",
                hobbies: ["アート", "創作", "香り", "イラスト", "デザイン"]
            },
            {
                id: "kirari_hkmr",
                displayName: "きらり",
                username: "@kirari_hkmr",
                icon: "https://picsum.photos/id/160/300/300",
                bio: "キラキラヒカマー！毎日かわいいものを発信しています✨",
                xLink: "https://x.com/kirari_hkmr",
                hobbies: ["かわいいもの", "キラキラ", "ファッション", "SNS発信", "コスメ"]
            },
            {
                id: "kuma_hkmr",
                displayName: "くま",
                username: "@kuma_hkmr",
                icon: "https://picsum.photos/id/201/300/300",
                bio: "クマのような癒し系ヒカマー。みんなを優しく包み込みます🐻",
                xLink: "https://x.com/kuma_hkmr",
                hobbies: ["癒し", "動物", "クマグッズ", "リラックス", "優しさ"]
            },
            {
                id: "sora_hkmr",
                displayName: "そら",
                username: "@sora_hkmr",
                icon: "https://picsum.photos/id/211/300/300",
                bio: "空のように自由なヒカマー。旅と写真が好きです☁️",
                xLink: "https://x.com/sora_hkmr",
                hobbies: ["旅", "写真", "アウトドア", "風景撮影", "自由"]
            },
            {
                id: "nana_hkmr",
                displayName: "なな",
                username: "@nana_hkmr",
                icon: "https://picsum.photos/id/251/300/300",
                bio: "7色のヒカマー。みんなの日常をカラフルに彩ります🌈",
                xLink: "https://x.com/nana_hkmr",
                hobbies: ["カラフル", "日常", "アート", "カラーリング", "デザイン"]
            }
        ]

        // 五十音順でソート（日本語対応）
        function sortHikamers() {
            hikamers.sort((a, b) => {
                return a.displayName.localeCompare(b.displayName, 'ja')
            })
        }

        // 検索フィルター（強化版：趣味も完全対応）
        function filterHikamers(query) {
            if (!query) return hikamers
            const q = query.toLowerCase().trim()
            
            return hikamers.filter(h => {
                // 名前・ハンドル・Bio検索（従来通り）
                const nameMatch = h.displayName.toLowerCase().includes(q)
                const usernameMatch = h.username.toLowerCase().includes(q)
                const bioMatch = h.bio.toLowerCase().includes(q)
                
                // 趣味検索（配列内のどれかに含まれるか）
                const hobbyMatch = h.hobbies.some(hobby => 
                    hobby.toLowerCase().includes(q)
                )
                
                return nameMatch || usernameMatch || bioMatch || hobbyMatch
            })
        }

        // 一覧をレンダリング（趣味タグも表示）
        function renderList(filtered) {
            const container = document.getElementById('listContainer')
            container.innerHTML = ''

            if (filtered.length === 0) {
                document.getElementById('emptyMessage').classList.remove('hidden')
                return
            }
            document.getElementById('emptyMessage').classList.add('hidden')

            filtered.forEach(h => {
                // 趣味タグのHTML生成
                const hobbyTags = h.hobbies.map(hobby => `
                    <span class="hobby-tag text-xs bg-slate-700 text-slate-300 px-3 py-1 rounded-3xl whitespace-nowrap">${hobby}</span>
                `).join('')

                const cardHTML = `
                    <div onclick="showProfile('${h.id}')" 
                         class="card-hover bg-slate-800 rounded-3xl p-6 cursor-pointer flex flex-col items-center text-center border border-transparent hover:border-violet-400">
                        <img src="${h.icon}" alt="${h.displayName}" 
                             class="w-24 h-24 rounded-2xl object-cover mb-5 shadow-inner">
                        <h3 class="text-2xl font-bold mb-1">${h.displayName}</h3>
                        <p class="text-violet-400 font-medium mb-3">${h.username}</p>
                        <p class="text-slate-400 text-sm line-clamp-2 mb-4">${h.bio}</p>
                        
                        <!-- 趣味タグ -->
                        <div class="flex flex-wrap gap-2 justify-center w-full">
                            ${hobbyTags}
                        </div>
                    </div>
                `
                container.innerHTML += cardHTML
            })

            // 総数を更新
            document.getElementById('totalCount').textContent = hikamers.length
        }

        // プロフィール表示（趣味セクションを追加）
        function showProfile(id) {
            const user = hikamers.find(h => h.id === id)
            if (!user) return

            const modal = document.getElementById('profileModal')
            const content = document.getElementById('modalContent')

            // 趣味タグHTML
            const hobbyTagsHTML = user.hobbies.map(hobby => `
                <span class="hobby-tag text-sm bg-slate-700 text-slate-300 px-5 py-2 rounded-3xl whitespace-nowrap">${hobby}</span>
            `).join('')

            content.innerHTML = `
                <div class="flex flex-col items-center">
                    <!-- 大きなアイコン -->
                    <img src="${user.icon}" alt="${user.displayName}" 
                         class="profile-icon w-36 h-36 rounded-3xl object-cover mb-6">
                    
                    <!-- 名前とハンドル -->
                    <h1 class="text-4xl font-bold mb-1">${user.displayName}</h1>
                    <p class="text-violet-400 text-2xl mb-6">${user.username}</p>
                    
                    <!-- プロフィール本文 -->
                    <div class="bg-slate-900 rounded-2xl p-6 w-full mb-8">
                        <p class="text-slate-300 leading-relaxed text-lg">${user.bio}</p>
                    </div>
                    
                    <!-- 趣味セクション（新設） -->
                    <div class="w-full mb-8">
                        <h4 class="text-sm uppercase tracking-widest text-violet-400 font-medium mb-3 flex items-center gap-2">
                            <span>🎨</span> 趣味・興味
                        </h4>
                        <div class="flex flex-wrap gap-2">
                            ${hobbyTagsHTML}
                        </div>
                    </div>
                    
                    <!-- Xリンク -->
                    <a href="${user.xLink}" target="_blank"
                       class="inline-flex items-center gap-3 bg-black hover:bg-slate-950 text-white px-10 py-5 rounded-3xl text-xl font-medium transition-all">
                        <span class="text-3xl">𝕏</span>
                        <span>Xでこのヒカマーを見る</span>
                    </a>
                    
                    <p class="text-xs text-slate-500 mt-8">URL: <span class="font-mono">#${user.id}</span></p>
                </div>
            `

            modal.classList.remove('hidden')
            modal.classList.add('flex')
            
            // URLにハッシュを追加（ブックマーク可能）
            window.history.replaceState(null, '', `#${user.id}`)
        }

        // モーダルを閉じる
        function closeModal() {
            const modal = document.getElementById('profileModal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
            // ハッシュをクリア
            window.history.replaceState(null, '', window.location.pathname)
        }

        // 一覧に戻る
        function resetView() {
            closeModal()
            document.getElementById('searchInput').value = ''
            renderList(hikamers)
        }

        // ハッシュ変更を監視（直接URLで#idにアクセスしたとき）
        function handleHashChange() {
            const hash = window.location.hash
            if (hash) {
                const id = hash.substring(1)
                const user = hikamers.find(h => h.id === id)
                if (user) {
                    showProfile(id)
                }
            }
        }

        // Tailwind初期化
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: {
                    extend: {}
                }
            }
        }

        // メイン起動
        function init() {
            initTailwind()
            sortHikamers()
            
            // 初期一覧表示
            renderList(hikamers)
            
            // 検索イベント（リアルタイムで強力検索）
            const searchInput = document.getElementById('searchInput')
            searchInput.addEventListener('input', () => {
                const query = searchInput.value.trim()
                const filtered = filterHikamers(query)
                renderList(filtered)
                
                // 検索中はモーダルを閉じる
                if (document.getElementById('profileModal').classList.contains('flex')) {
                    closeModal()
                }
            })
            
            // ハッシュ監視
            window.addEventListener('hashchange', handleHashChange)
            
            // ページロード時にハッシュがあれば即表示
            if (window.location.hash) {
                handleHashChange()
            }
            
            console.log('%c✅ ヒカマーズ図鑑が正常に起動しました！（検索強化版）', 'color:#a78bfa; font-size:16px; font-weight:bold')
            console.log('💡 強化ポイント：')
            console.log('・趣味フィールドを全ヒカマーに追加')
            console.log('・検索対象に「趣味」を完全追加（名前・ハンドル・Bio・趣味すべてヒット）')
            console.log('・カードとモーダルに趣味タグを美しく表示')
            console.log('・検索ヒントを更新（「趣味で検索...」）')
            console.log('・今後新しいヒカマーを追加するときも hobbies: ["趣味1", "趣味2"] でOK！')
        }

        // 起動！
        window.onload = init
    </script>
</body>
</html>
