<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STELLARIS-MOBILE: V1.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --alert: #ff0055; }
        
        /* ダブルタップ拡大防止と基本設定 */
        * { touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; }
        
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 操作系 */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; 
                         background: rgba(255,255,255,0.05); border: 2px solid rgba(0,242,255,0.2); 
                         border-radius: 50%; pointer-events: auto; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; 
                          background: var(--neon); border-radius: 50%; transform: translate(-50%, -50%); 
                          box-shadow: 0 0 20px var(--neon); opacity: 0.8; }

        /* HUD */
        #hud { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; color: var(--neon); pointer-events: none; }
        .mission-text { font-size: 14px; background: rgba(0,0,0,0.4); padding: 5px 10px; border-left: 3px solid var(--neon); margin-top: 5px; }
        
        #action-btn { position: absolute; bottom: 50px; right: 40px; width: 90px; height: 90px; 
                      background: rgba(0,242,255,0.1); border: 3px solid var(--neon); border-radius: 50%; 
                      color: var(--neon); display: flex; align-items: center; justify-content: center; 
                      font-weight: bold; pointer-events: auto; visibility: hidden; 
                      box-shadow: 0 0 15px var(--neon); }

        #msg { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); 
               color: white; text-align: center; width: 80%; pointer-events: none; 
               background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="hud">
        <div style="font-size: 18px; font-weight: bold; text-shadow: 0 0 10px var(--neon);">STELLARIS-9 : DECK A</div>
        <div class="mission-text" id="mission">任務: 通路の先のリアクターを起動せよ</div>
    </div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div id="action-btn">INTERACT</div>
    <div id="msg">メッセージを表示します</div>
</div>

<script>
let scene, camera, renderer, player;
let moveForward = 0, moveSide = 0;
let lookYaw = 0, lookPitch = 0;

function init() {
    scene = new THREE.Scene();
    // 背景を少し明るい宇宙色に変更
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.1);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    player = new THREE.Group();
    player.add(camera);
    scene.add(player);
    player.position.set(0, 1.6, 10);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ライティングを強化
    const ambient = new THREE.AmbientLight(0x4040ff, 0.5); // 全体を少し青白く
    scene.add(ambient);
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
    sunLight.position.set(5, 10, 7.5);
    scene.add(sunLight);

    // 床：グリッドを追加して移動を分かりやすく
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x151525 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    const grid = new THREE.GridHelper(200, 50, 0x00f2ff, 0x222244);
    grid.position.y = 0.05;
    scene.add(grid);

    // 目標物（リアクター）
    createTarget(0, 1, -10, 0xff0055, "REACTOR");
    
    // 周囲の壁（基地感）
    for(let i=0; i<10; i++) {
        createWall(Math.random()*40-20, 2, Math.random()*40-20);
    }

    window.addEventListener('resize', onWindowResize, false);
    setupControls();
    animate();
}

function createTarget(x, y, z, color, name) {
    const geo = new THREE.IcosahedronGeometry(1.5, 0);
    const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData.name = name;
    scene.add(mesh);
}

function createWall(x, y, z) {
    const geo = new THREE.BoxGeometry(4, 8, 0.5);
    const mat = new THREE.MeshStandardMaterial({ color: 0x222233 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, 4, z);
    scene.add(mesh);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

/**
 * 操作改善：ジョイスティックとスムーズな視点操作
 */
function setupControls() {
    const joystick = document.getElementById('joystick-zone');
    const stick = document.getElementById('joystick-stick');
    let joyTouchId = null;
    let lastTouchX, lastTouchY;

    window.addEventListener('touchstart', (e) => {
        for (let t of e.changedTouches) {
            if (t.clientX < window.innerWidth / 2) {
                joyTouchId = t.identifier;
            } else {
                lastTouchX = t.clientX;
                lastTouchY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener('touchmove', (e) => {
        e.preventDefault(); // ズームやスクロールを完全に阻止
        for (let t of e.changedTouches) {
            if (t.identifier === joyTouchId) {
                const rect = joystick.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = t.clientX - centerX;
                const dy = t.clientY - centerY;
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const angle = Math.atan2(dy, dx);

                stick.style.left = (50 + Math.cos(angle) * (dist/60 * 50)) + '%';
                stick.style.top = (50 + Math.sin(angle) * (dist/60 * 50)) + '%';

                // 前後移動の向きを修正：dyがマイナス（上）のとき前進（-Z方向）
                moveSide = (dx / 50);
                moveForward = (dy / 50); 
            } else {
                const dx = t.clientX - lastTouchX;
                const dy = t.clientY - lastTouchY;
                lookYaw -= dx * 0.006;
                lookPitch -= dy * 0.006;
                lookPitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, lookPitch));
                lastTouchX = t.clientX;
                lastTouchY = t.clientY;
            }
        }
    }, {passive: false});

    window.addEventListener('touchend', (e) => {
        for (let t of e.changedTouches) {
            if (t.identifier === joyTouchId) {
                joyTouchId = null;
                moveForward = 0; moveSide = 0;
                stick.style.left = '50%'; stick.style.top = '50%';
            }
        }
    });
}

function animate() {
    requestAnimationFrame(animate);

    // 移動ロジック
    // moveForwardがプラス（下方向に入力）なら+Z、マイナス（上方向に入力）なら-Zへ移動
    const moveVector = new THREE.Vector3(moveSide * 0.15, 0, moveForward * 0.15);
    moveVector.applyQuaternion(player.quaternion);
    player.position.add(moveVector);

    player.rotation.y = lookYaw;
    camera.rotation.x = lookPitch;

    // インタラクション判定
    checkInteractions();

    renderer.render(scene, camera);
}

function checkInteractions() {
    const btn = document.getElementById('action-btn');
    const msg = document.getElementById('msg');
    
    // リアクターとの距離
    const dist = player.position.distanceTo(new THREE.Vector3(0, 1, -10));
    
    if (dist < 4) {
        btn.style.visibility = 'visible';
        if(btn.style.opacity == 0) {
            showMsg("リアクターに接近。INTERACTを押して起動。");
            btn.style.opacity = 1;
        }
    } else {
        btn.style.visibility = 'hidden';
        btn.style.opacity = 0;
    }
}

function showMsg(text) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.style.opacity = 1;
    setTimeout(() => { msg.style.opacity = 0; }, 3000);
}

init();
</script>
</body>
</html>
