<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Tactical PvE - Grenade & Balance Update</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; background: #000; }
        #ui { position: absolute; top: 15px; left: 15px; color: #111; pointer-events: none; background: rgba(255,255,255,0.8); padding: 12px; border-radius: 8px; font-weight: bold; border: 2px solid #444; z-index: 5; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; }
        #crosshair::before { width: 100%; height: 2px; top: 9px; } #crosshair::after { width: 2px; height: 100%; left: 9px; }
        
        #scope-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, black 35%, black 100%);
            display: none; pointer-events: none; z-index: 10;
        }
        #scope-overlay::before, #scope-overlay::after { content: ''; position: absolute; background: rgba(0, 255, 0, 0.5); }
        #scope-overlay::before { width: 100%; height: 1px; top: 50%; }
        #scope-overlay::after { width: 1px; height: 100%; left: 50%; }

        #ammo-display { position: absolute; bottom: 30px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #777; min-width: 140px; z-index: 5; }
        #reload-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #ffeb3b; font-size: 24px; font-weight: bold; display: none; text-shadow: 2px 2px #000; z-index: 5; }
        #click-to-start { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; cursor: pointer; z-index: 100; text-align: center; }
    </style>
</head>
<body>
    <div id="click-to-start">CLICK TO DEPLOY<br><span style="font-size:14px;">[WASD]: Move | [Space]: Fire | [G]: Grenade | [1-4]: Weapon Switch</span></div>
    <div id="scope-overlay"></div>
    <div id="ui">SCORE: <span id="score">0</span> | WAVE: <span id="wave">1</span> | HP: <span id="health">100</span></div>
    <div id="reload-msg">RELOADING...</div>
    <div id="crosshair"></div>

    <div id="ammo-display">
        <div id="weapon-name" style="color: #ffeb3b; font-size: 1.2em;">XM7</div>
        <div style="font-size: 32px;"><span id="current-ammo">45</span> / <span id="max-ammo">45</span></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- バランス調整された設定 ---
        const STAGE_SIZE = 100;
        const WEAPONS = {
            S12K: { name: 'S12K', maxAmmo: 6, rpm: 180, reloadTime: 2000, recoil: 0.16, damage: 45, spread: 0.15, pellets: 12, color: 0x1a1a1a, adsFov: 55 },
            XM7: { name: 'XM7', maxAmmo: 40, rpm: 750, reloadTime: 2200, recoil: 0.04, damage: 32, spread: 0.025, pellets: 1, color: 0x7a6a4f, adsFov: 40 },
            AWM: { name: 'AWM', maxAmmo: 5, rpm: 40, reloadTime: 3800, recoil: 0.8, damage: 350, spread: 0.001, pellets: 1, color: 0x4a5d4a, adsFov: 12 },
            UZI: { name: 'UZI', maxAmmo: 35, rpm: 1350, reloadTime: 1600, recoil: 0.035, damage: 14, spread: 0.09, pellets: 1, color: 0x222222, adsFov: 65 }
        };

        let currentWeapon = WEAPONS.XM7;
        let ammo = currentWeapon.maxAmmo, isReloading = false, isAds = false;
        let score = 0, wave = 1, playerHealth = 100, lastFireTime = 0, targetRecoilX = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 1000);
        camera.rotation.order = 'YXZ';
        camera.position.set(0, 1.6, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(30, 60, 30);
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(STAGE_SIZE, STAGE_SIZE), new THREE.MeshStandardMaterial({ color: 0x6a8a6a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const obstacles = [];
        const boxMat = new THREE.MeshStandardMaterial({ color: 0x554433, roughness: 0.8 });
        function addBox(w, h, d, x, z) {
            const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), boxMat);
            box.position.set(x, h/2, z); scene.add(box); obstacles.push(box);
        }
        addBox(4, 3, 4, 10, 10); addBox(6, 2, 3, -15, 20); addBox(3, 4, 3, 20, -15); addBox(5, 2, 5, -5, -10);

        const towerGroup = new THREE.Group();
        const platform = new THREE.Mesh(new THREE.BoxGeometry(6, 0.4, 6), boxMat);
        platform.position.y = 6;
        towerGroup.add(platform);
        towerGroup.position.set(-40, 0, -40);
        scene.add(towerGroup);
        obstacles.push(platform);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const createWall = (w, h, d, x, z) => {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            wall.position.set(x, h/2, z); scene.add(wall); obstacles.push(wall);
        };
        createWall(STAGE_SIZE, 8, 2, 0, STAGE_SIZE/2); createWall(STAGE_SIZE, 8, 2, 0, -STAGE_SIZE/2);
        createWall(2, 8, STAGE_SIZE, STAGE_SIZE/2, 0); createWall(2, 8, STAGE_SIZE, -STAGE_SIZE/2, 0);

        const weaponGroup = new THREE.Group();
        const weaponPivot = new THREE.Group();
        const gunContainer = new THREE.Group();
        const muzzleFlash = new THREE.PointLight(0xffaa00, 0, 5);
        const flashMesh = new THREE.Mesh(new THREE.SphereGeometry(0.05), new THREE.MeshBasicMaterial({color: 0xffff00}));
        flashMesh.visible = false;
        gunContainer.add(muzzleFlash, flashMesh);

        function buildGunModel(config) {
            gunContainer.clear();
            gunContainer.add(muzzleFlash, flashMesh);
            const mat = new THREE.MeshStandardMaterial({ color: config.color, metalness: 0.6, roughness: 0.4 });
            let bL = config.name === 'UZI' ? 0.35 : 0.6;
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, bL), mat);
            gunContainer.add(body);
            const barrelLen = config.name === 'AWM' ? 0.8 : (config.name === 'UZI' ? 0.15 : 0.4);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, barrelLen), mat);
            barrel.rotation.x = Math.PI / 2; barrel.position.z = - (bL/2 + barrelLen/2);
            gunContainer.add(barrel);
            flashMesh.position.z = barrel.position.z - barrelLen/2;
            muzzleFlash.position.copy(flashMesh.position);
            if (config.name === 'AWM') {
                const scope = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3), mat);
                scope.rotation.x = Math.PI / 2; scope.position.y = 0.12; gunContainer.add(scope);
            }
            gunContainer.position.set(0.3, -0.25, -0.6);
            return gunContainer;
        }

        weaponPivot.add(buildGunModel(currentWeapon));
        weaponGroup.add(weaponPivot);
        scene.add(weaponGroup);

        const grenades = [], blasts = [], enemies = [];
        function throwGrenade() {
            const g = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color: 0x224422}));
            g.position.copy(camera.position);
            const dir = camera.getWorldDirection(new THREE.Vector3());
            // 少し上に放り投げるベクトル
            g.userData = { velocity: dir.multiplyScalar(0.55).add(new THREE.Vector3(0, 0.15, 0)), life: 120 };
            scene.add(g); grenades.push(g);
        }

        function createExplosion(pos) {
            const exp = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0xffaa00, transparent: true, opacity: 0.8}));
            exp.position.copy(pos);
            scene.add(exp);
            blasts.push({ mesh: exp, scale: 1, alpha: 0.8 });

            const blastLight = new THREE.PointLight(0xff5500, 15, 12);
            blastLight.position.copy(pos);
            scene.add(blastLight);
            setTimeout(() => scene.remove(blastLight), 150);

            // 敵への確実なダメージ処理
            enemies.forEach(e => {
                const dist = e.position.distanceTo(pos);
                if(dist < 7.5) {
                    const dmg = dist < 3 ? 500 : 200; // 中心に近いほど高威力
                    e.userData.hp -= dmg;
                    if(e.userData.hp <= 0) {
                        scene.remove(e);
                        enemies.splice(enemies.indexOf(e), 1);
                        score += 150;
                    }
                }
            });
        }

        function spawnEnemy() {
            const e = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xcc3333 }));
            let ex = (Math.random() - 0.5) * (STAGE_SIZE - 20);
            let ez = (Math.random() - 0.5) * (STAGE_SIZE - 20);
            e.position.set(ex, 1, ez);
            e.userData = { hp: 100, lastAtk: 0, steerAngle: 0 };
            scene.add(e); enemies.push(e);
        }

        function showFlash() {
            flashMesh.visible = true; muzzleFlash.intensity = 15;
            setTimeout(() => { flashMesh.visible = false; muzzleFlash.intensity = 0; }, 35);
        }

        function fire() {
            if (isReloading || ammo <= 0 || playerHealth <= 0) return;
            const now = Date.now();
            if (now - lastFireTime < (60000 / currentWeapon.rpm)) return;
            ammo--; lastFireTime = now; updateUI(); showFlash();
            targetRecoilX += currentWeapon.recoil;
            weaponPivot.position.z += 0.12;
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(enemies);
            if(hits.length > 0) {
                const e = hits[0].object; e.userData.hp -= currentWeapon.damage;
                if(e.userData.hp <= 0) { scene.remove(e); enemies.splice(enemies.indexOf(e), 1); score += 100; }
            }
            if(ammo === 0) reload();
        }

        function reload() {
            if(isReloading || ammo === currentWeapon.maxAmmo) return;
            isReloading = true; document.getElementById('reload-msg').style.display = 'block';
            setTimeout(() => { ammo = currentWeapon.maxAmmo; isReloading = false; document.getElementById('reload-msg').style.display = 'none'; updateUI(); }, currentWeapon.reloadTime);
        }

        function switchWeapon(key) {
            currentWeapon = WEAPONS[key]; buildGunModel(currentWeapon);
            ammo = currentWeapon.maxAmmo; isAds = false; updateScope(); updateUI();
        }

        function updateScope() {
            camera.fov = isAds ? currentWeapon.adsFov : 75; camera.updateProjectionMatrix();
            const scope = document.getElementById('scope-overlay');
            if (isAds && currentWeapon.name === 'AWM') { scope.style.display = 'block'; gunContainer.visible = false; }
            else { scope.style.display = 'none'; gunContainer.visible = true; gunContainer.position.set(isAds ? 0 : 0.3, isAds ? -0.12 : -0.25, -0.6); }
        }

        function updateUI() {
            document.getElementById('current-ammo').innerText = ammo;
            document.getElementById('weapon-name').innerText = currentWeapon.name;
            document.getElementById('score').innerText = score;
            document.getElementById('wave').innerText = wave;
            document.getElementById('health').innerText = playerHealth;
        }

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Space') fire();
            if(e.code === 'KeyG') throwGrenade();
            if(e.code === 'Enter') { isAds = !isAds; updateScope(); }
            if(e.code === 'KeyR') reload();
            if(e.code.startsWith('Digit')) switchWeapon(Object.keys(WEAPONS)[parseInt(e.key)-1]);
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                const s = isAds ? (currentWeapon.adsFov / 75) * 0.002 : 0.0022;
                camera.rotation.y -= e.movementX * s; camera.rotation.x -= e.movementY * s;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x));
            }
        });

        document.getElementById('click-to-start').addEventListener('click', function() { this.style.display = 'none'; document.body.requestPointerLock(); });

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();
            camera.rotation.x += targetRecoilX * 0.1; targetRecoilX *= 0.9;
            weaponPivot.position.lerp(new THREE.Vector3(0,0,0), 0.2);
            weaponGroup.position.copy(camera.position); weaponGroup.quaternion.copy(camera.quaternion);

            // グレネード物理
            for(let i=grenades.length-1; i>=0; i--) {
                const g = grenades[i]; 
                g.position.add(g.userData.velocity); 
                g.userData.velocity.y -= 0.015; // 重力
                if(g.position.y < 0.15) { g.position.y = 0.15; g.userData.velocity.multiplyScalar(0.5); }
                g.userData.life--;
                if(g.userData.life <= 0) {
                    createExplosion(g.position);
                    scene.remove(g); grenades.splice(i, 1);
                }
            }

            // 爆破演出（膨らんで消える）
            for(let i=blasts.length-1; i>=0; i--) {
                const b = blasts[i];
                b.scale += 0.4; b.alpha -= 0.05;
                b.mesh.scale.set(b.scale, b.scale, b.scale);
                b.mesh.material.opacity = b.alpha;
                if(b.alpha <= 0) { scene.remove(b.mesh); blasts.splice(i, 1); }
            }

            // プレイヤー移動
            const s = 0.15;
            const move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
            if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
            move.applyQuaternion(camera.quaternion); move.y = 0;
            const nextPos = camera.position.clone().add(move.normalize().multiplyScalar(s));
            
            let canMove = true;
            obstacles.forEach(ob => {
                const box = new THREE.Box3().setFromObject(ob);
                if(box.containsPoint(nextPos)) canMove = false;
            });
            if(canMove) { camera.position.x = nextPos.x; camera.position.z = nextPos.z; }

            const rayDown = new THREE.Raycaster(new THREE.Vector3(camera.position.x, 10, camera.position.z), new THREE.Vector3(0, -1, 0));
            const groundHits = rayDown.intersectObjects([floor, platform]);
            if (groundHits.length > 0) {
                const targetY = groundHits[0].point.y + 1.6;
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, targetY, 0.2);
            }

            // 敵AI
            enemies.forEach(e => {
                const toPlayer = new THREE.Vector3().subVectors(camera.position, e.position);
                toPlayer.y = 0;
                const dist = toPlayer.length(), dir = toPlayer.normalize();
                const ray = new THREE.Raycaster(e.position, dir, 0, 3);
                const hits = ray.intersectObjects(obstacles);
                if(hits.length > 0) e.userData.steerAngle += 0.15; else e.userData.steerAngle *= 0.9;
                const finalDir = dir.applyAxisAngle(new THREE.Vector3(0,1,0), e.userData.steerAngle);
                if(dist > 1.8) e.position.add(finalDir.multiplyScalar(0.05 + wave*0.003));
                else if(playerHealth > 0 && now - e.userData.lastAtk > 1000) {
                    playerHealth -= 10; e.userData.lastAtk = now; updateUI();
                    if(playerHealth <= 0) { alert("MISSION FAILED. SCORE: " + score); location.reload(); }
                }
                e.lookAt(camera.position.x, 1, camera.position.z);
            });

            if(enemies.length === 0) { wave++; for(let i=0; i<2+wave; i++) spawnEnemy(); }
            renderer.render(scene, camera);
        }

        spawnEnemy(); updateUI(); animate();
    </script>
</body>
</html>
