<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Survival - Laser & Flashlight</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; background: #000; }
        #ui { position: absolute; top: 15px; left: 15px; color: #00ff00; pointer-events: none; background: rgba(0,20,0,0.7); padding: 15px; border-radius: 5px; border: 1px solid #00ff00; z-index: 5; }
        #crosshair-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; }
        #crosshair { width: 4px; height: 4px; background: #00ff00; border-radius: 50%; }
        #hit-marker { position: absolute; top: -10px; left: -10px; width: 24px; height: 24px; display: none; }
        #hit-marker::before, #hit-marker::after { content: ''; position: absolute; background: #ff4444; width: 100%; height: 2px; top: 11px; }
        #hit-marker::before { transform: rotate(45deg); } #hit-marker::after { transform: rotate(-45deg); }
        #ammo-display { position: absolute; bottom: 30px; left: 20px; color: #00ff00; background: rgba(0,20,0,0.8); padding: 15px; border-radius: 5px; border: 1px solid #00ff00; min-width: 180px; z-index: 5; }
        #reload-msg { position: absolute; top: 60%; left: 50%; transform: translate(-50%, -50%); color: #ff0000; font-size: 28px; font-weight: bold; display: none; text-shadow: 0 0 10px #ff0000; z-index: 5; }
        #click-to-start { position: absolute; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; color: #00ff00; font-size: 24px; cursor: pointer; z-index: 100; text-align: center; border: 5px solid #004400; box-sizing: border-box; }
        .stat-up { color: #fff; font-size: 12px; }
    </style>
</head>
<body>
    <div id="click-to-start">SYSTEM INITIALIZING...<br>[ CLICK TO START DEPLOYMENT ]<br><span style="font-size:14px; color:#666;">Flashlight & Laser Online | High-Spec Weapons Detected</span></div>
    <div id="ui">
        SCORE: <span id="score">0</span> | HP: <span id="health">100</span>
        <div id="weapon-lv" style="color: #ffeb3b; margin-top:5px;">Lv.1 ALPHA</div>
    </div>
    <div id="reload-msg">RELOADING...</div>
    <div id="crosshair-container"><div id="crosshair"></div><div id="hit-marker"></div></div>
    <div id="ammo-display">
        <div id="weapon-name" style="font-size: 1.4em; color: #fff;">XM7 ADVANCED</div>
        <div style="font-size: 24px;"><span id="current-ammo">40</span> / <span id="max-ammo">40</span></div>
        <div id="upgrade-info" class="stat-up">Next Upgrade at 500</div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        // --- 設定 ---
        const STAGE_SIZE = 150;
        let score = 0, playerHealth = 100, lastFireTime = 0, lastSpawnTime = 0;
        let nextUpgradeScore = 500;

        const WEAPONS = {
            XM7: { name: 'XM7', lv: 1, ammo: 40, maxAmmo: 40, rpm: 600, reloadTime: 1800, damage: 35, recoil: 0.04, spread: 0.02, color: 0x222222 },
            S12K: { name: 'S12K', lv: 1, ammo: 8, maxAmmo: 8, rpm: 150, reloadTime: 2200, damage: 30, recoil: 0.2, spread: 0.18, color: 0x111111, pellets: 8 }
        };
        let currentWeapon = WEAPONS.XM7;
        let isReloading = false;

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x000000, 1, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 暗闇の設定
        scene.add(new THREE.AmbientLight(0x000000)); // 環境光なし

        // 床
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(STAGE_SIZE, STAGE_SIZE), floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 武器とライトのグループ
        const weaponGroup = new THREE.Group();
        const flashLight = new THREE.SpotLight(0xffffff, 40, 60, Math.PI / 6, 0.5, 1);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -10);
        weaponGroup.add(flashLight);
        weaponGroup.add(flashLight.target);

        // レーザーサイト
        const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-100)]);
        const laserMat = new THREE.LineBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });
        const laser = new THREE.Line(laserGeo, laserMat);
        weaponGroup.add(laser);

        // 銃モデル
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshStandardMaterial({color: 0x222222}));
        gunBody.position.set(0.2, -0.2, -0.4);
        weaponGroup.add(gunBody);
        scene.add(weaponGroup);

        const enemies = [], tracers = [];

        // --- 敵のスポーン ---
        function spawnEnemy() {
            if (enemies.length > 30) return;
            const rand = Math.random();
            let type = { color: 0xff0000, hp: 100, speed: 0.08, scale: 1, name: "NORMAL" };
            
            if (rand < 0.1) type = { color: 0xffffff, hp: 600, speed: 0.03, scale: 1.5, name: "PHANTOM" };
            else if (rand < 0.25) type = { color: 0xffff00, hp: 50, speed: 0.22, scale: 0.7, name: "SPRINTER" };
            else if (rand < 0.4) type = { color: 0x00aaff, hp: 300, speed: 0.06, scale: 1.2, name: "ELITE" };

            const e = new THREE.Mesh(
                new THREE.BoxGeometry(0.8 * type.scale, 1.8 * type.scale, 0.8 * type.scale),
                new THREE.MeshStandardMaterial({ color: type.color, emissive: type.color, emissiveIntensity: 0.2 })
            );
            
            const ang = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 20;
            e.position.set(camera.position.x + Math.cos(ang)*dist, (1.8*type.scale)/2, camera.position.z + Math.sin(ang)*dist);
            e.userData = { ...type, lastAtk: 0 };
            scene.add(e);
            enemies.push(e);
        }

        // --- 武器強化システム ---
        function upgradeWeapon() {
            currentWeapon.lv++;
            currentWeapon.damage += 20; // 威力大幅アップ
            currentWeapon.rpm += 150;    // 連射速度大幅アップ
            currentWeapon.maxAmmo += 10; // 装弾数アップ
            currentWeapon.ammo = currentWeapon.maxAmmo;
            nextUpgradeScore += 1000;
            
            document.getElementById('weapon-lv').innerText = `Lv.${currentWeapon.lv} SUPERCHARGED`;
            updateUI();
        }

        function fire() {
            if (isReloading || currentWeapon.ammo <= 0 || playerHealth <= 0) return;
            const now = Date.now();
            if (now - lastFireTime < (60000 / currentWeapon.rpm)) return;

            currentWeapon.ammo--;
            lastFireTime = now;
            updateUI();

            const pellets = currentWeapon.pellets || 1;
            const ray = new THREE.Raycaster();
            let hit = false;

            for(let i=0; i<pellets; i++) {
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                ray.ray.direction.x += (Math.random()-0.5) * currentWeapon.spread;
                ray.ray.direction.y += (Math.random()-0.5) * currentWeapon.spread;

                const intersects = ray.intersectObjects(enemies);
                if (intersects.length > 0) {
                    const e = intersects[0].object;
                    e.userData.hp -= currentWeapon.damage;
                    hit = true;
                    if (e.userData.hp <= 0) {
                        score += (e.userData.name === "NORMAL" ? 100 : 250);
                        scene.remove(e);
                        enemies.splice(enemies.indexOf(e), 1);
                        if(score >= nextUpgradeScore) upgradeWeapon();
                    }
                }
            }
            if(hit) {
                document.getElementById('hit-marker').style.display = 'block';
                setTimeout(()=> document.getElementById('hit-marker').style.display = 'none', 50);
            }
            if(currentWeapon.ammo === 0) reload();
        }

        function reload() {
            isReloading = true;
            document.getElementById('reload-msg').style.display = 'block';
            setTimeout(() => {
                currentWeapon.ammo = currentWeapon.maxAmmo;
                isReloading = false;
                document.getElementById('reload-msg').style.display = 'none';
                updateUI();
            }, currentWeapon.reloadTime);
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('health').innerText = Math.max(0, playerHealth);
            document.getElementById('current-ammo').innerText = currentWeapon.ammo;
            document.getElementById('max-ammo').innerText = currentWeapon.maxAmmo;
            document.getElementById('upgrade-info').innerText = `Next: ${nextUpgradeScore} pts`;
        }

        // --- ループ & 入力 ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
            }
        });

        document.getElementById('click-to-start').addEventListener('click', function() {
            this.style.display = 'none';
            document.body.requestPointerLock();
        });

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            // スポーン
            if (now - lastSpawnTime > Math.max(500, 2000 - score/10)) {
                spawnEnemy();
                lastSpawnTime = now;
            }

            // 移動
            const move = new THREE.Vector3();
            if(keys['KeyW']) move.z -= 1; if(keys['KeyS']) move.z += 1;
            if(keys['KeyA']) move.x -= 1; if(keys['KeyD']) move.x += 1;
            move.applyQuaternion(camera.quaternion).setY(0).normalize().multiplyScalar(0.15);
            camera.position.add(move);
            camera.position.y = 1.6;

            // 武器位置更新
            weaponGroup.position.copy(camera.position);
            weaponGroup.quaternion.copy(camera.quaternion);

            if(keys['Space']) fire();

            // 敵の挙動
            enemies.forEach(e => {
                const toPlayer = new THREE.Vector3().subVectors(camera.position, e.position).setY(0);
                const dist = toPlayer.length();
                e.translateOnAxis(toPlayer.normalize(), e.userData.speed);
                e.lookAt(camera.position.x, e.position.y, camera.position.z);

                if (dist < 1.5 && now - e.userData.lastAtk > 1000) {
                    playerHealth -= 10;
                    e.userData.lastAtk = now;
                    updateUI();
                    if(playerHealth <= 0) { alert("DEAD. SCORE: " + score); location.reload(); }
                }
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
