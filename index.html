<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STELLARIS-MOBILE: ESCAPE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --alert: #ff0055; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; }
        
        /* UIレイヤー */
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* 左半分：ジョイスティックエリア */
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; 
                         background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; 
                          background: var(--neon); border-radius: 50%; transform: translate(-50%, -50%); 
                          box-shadow: 0 0 20px var(--neon); }

        /* 右半分：視点操作エリア表示（実際は全画面で判定） */
        #touch-hint { position: absolute; right: 20px; bottom: 20px; color: var(--neon); font-size: 12px; opacity: 0.5; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; color: var(--neon); }
        .mission-text { font-size: 14px; border-left: 3px solid var(--neon); padding-left: 10px; }
        
        /* インタラクトボタン */
        #action-btn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; 
                      border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); 
                      display: flex; align-items: center; justify-content: center; font-weight: bold;
                      pointer-events: auto; background: rgba(0,0,0,0.5); visibility: hidden; }

        /* メッセージ */
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
               color: white; text-align: center; width: 80%; pointer-events: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="hud">
        <div style="font-size: 20px; font-weight: bold;">STATION: STELLARIS-9</div>
        <div class="mission-text" id="mission">任務: 電力を復旧させ、ロケット格納庫へ向かえ</div>
    </div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div id="touch-hint">SWIPE TO LOOK</div>
    <div id="action-btn">INTERACT</div>
    <div id="msg"></div>
</div>

<script>
/**
 * 3Dエンジンの基本設定
 */
let scene, camera, renderer, player;
let moveForward = 0, moveSide = 0;
let lookYaw = 0, lookPitch = 0;

function init() {
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000510, 0.05);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    player = new THREE.Group();
    player.add(camera);
    scene.add(player);
    player.position.set(0, 1.6, 5);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ライティング
    const light = new THREE.PointLight(0x00f2ff, 1, 50);
    player.add(light);
    scene.add(new THREE.AmbientLight(0x111122));

    // 仮の宇宙基地：床
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // 障害物・オブジェクト（ここにパズル要素を追加していく）
    createObject(0, 1, -5, 0xff0055, "REACT_CORE"); // リアクター
    createObject(5, 1, -10, 0x00ff00, "ESCAPE_SHIP"); // ロケット

    animate();
}

function createObject(x, y, z, color, name) {
    const geo = new THREE.BoxGeometry(2, 2, 2);
    const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.userData.name = name;
    scene.add(mesh);
}

/**
 * モバイル操作：ジョイスティックと視点
 */
const joystick = document.getElementById('joystick-zone');
const stick = document.getElementById('joystick-stick');
let joyTouchId = null;

// 視点操作用
let lastTouchX, lastTouchY;

window.addEventListener('touchstart', (e) => {
    for (let t of e.changedTouches) {
        if (t.clientX < window.innerWidth / 2) {
            joyTouchId = t.identifier;
        } else {
            lastTouchX = t.clientX;
            lastTouchY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    for (let t of e.changedTouches) {
        if (t.identifier === joyTouchId) {
            // ジョイスティック計算
            const rect = joystick.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = t.clientX - centerX;
            const dy = t.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);

            stick.style.left = (50 + Math.cos(angle) * dist) + '%';
            stick.style.top = (50 + Math.sin(angle) * dist) + '%';

            moveSide = (Math.cos(angle) * dist) / 50;
            moveForward = -(Math.sin(angle) * dist) / 50;
        } else {
            // 視点操作
            const dx = t.clientX - lastTouchX;
            const dy = t.clientY - lastTouchY;
            lookYaw -= dx * 0.005;
            lookPitch -= dy * 0.005;
            lookPitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, lookPitch));
            lastTouchX = t.clientX;
            lastTouchY = t.clientY;
        }
    }
}, {passive: false});

window.addEventListener('touchend', (e) => {
    for (let t of e.changedTouches) {
        if (t.identifier === joyTouchId) {
            joyTouchId = null;
            moveForward = 0; moveSide = 0;
            stick.style.left = '50%'; stick.style.top = '50%';
        }
    }
});

/**
 * 更新ループ
 */
function animate() {
    requestAnimationFrame(animate);

    // プレイヤーの向きに合わせて移動
    const dir = new THREE.Vector3(moveSide, 0, moveForward);
    dir.applyQuaternion(player.quaternion);
    player.position.add(dir.multiplyScalar(0.1));

    // カメラ回転の適用
    player.rotation.y = lookYaw;
    camera.rotation.x = lookPitch;

    checkInteractions();
    renderer.render(scene, camera);
}

function checkInteractions() {
    const btn = document.getElementById('action-btn');
    // プレイヤーとオブジェクトの距離判定（簡易版）
    // 実際にはRaycasterを使うとより正確です
    if (player.position.distanceTo(new THREE.Vector3(0, 1, -5)) < 3) {
        btn.style.visibility = 'visible';
    } else {
        btn.style.visibility = 'hidden';
    }
}

init();
</script>
</body>
</html>
